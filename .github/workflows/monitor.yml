name: Position Monitor

# Runs every 5 minutes Mon-Fri during market hours.
# Schedule is in UTC:
#   13:30-20:00 UTC  =  9:30 AM - 4:00 PM EDT  (summer)
#   14:30-21:00 UTC  =  9:30 AM - 4:00 PM EST  (winter)
# We bracket 13:00-21:00 UTC to cover both seasons safely.
# The monitor.py script uses MarketClock to skip CLOSED/AVOID windows.

on:
  schedule:
    # GitHub frequently DROPS high-frequency '*/5' crons on busy public runners.
    # Explicit minute lists are honored far more reliably than '*/N'.
    # Fires ~every 10 min across the session (13:00-20:50 UTC, Mon-Fri).
    - cron: '0,10,20,30,40,50 13-20 * * 1-5'

  workflow_dispatch:               # also allow manual trigger from GitHub UI

jobs:
  monitor:
    name: Check open positions
    runs-on: ubuntu-latest
    timeout-minutes: 8             # full-market scan needs headroom (was 4)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position monitor
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional AI keys — any ONE enables AI-written rationales.
          # Free signups: Groq (recommended) — https://console.groq.com/keys
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          # Optional live-data provider — Alpaca Markets (free IEX feed).
          # Massively more reliable than yfinance for cloud runners.
          # Sign up free: https://alpaca.markets/
          ALPACA_API_KEY:        ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:     ${{ secrets.ALPACA_API_SECRET }}
          # Broker (paper) auto-trading. BROKER_MODE=alpaca_paper routes
          # auto-entries to a real Alpaca PAPER account. Paper keys fall back to
          # ALPACA_API_KEY/SECRET if dedicated paper keys aren't set.
          BROKER_MODE:           ${{ secrets.BROKER_MODE }}
          ALPACA_PAPER_KEY:      ${{ secrets.ALPACA_PAPER_KEY }}
          ALPACA_PAPER_SECRET:   ${{ secrets.ALPACA_PAPER_SECRET }}
          # Trade the account as if it had this much equity (e.g. 1000) regardless
          # of the real paper balance. 0/unset = use the real balance.
          ACCOUNT_EQUITY_OVERRIDE: ${{ secrets.ACCOUNT_EQUITY_OVERRIDE }}
          # Data-collection floor: guarantee at least this many option trades per
          # day so we gather a profitability sample fast. Top-up trades that fall
          # below the normal quality gate are tagged 'momentum_call_explore' in
          # the journal and kept OUT of the real-strategy win-rate stats.
          # Set to 0 to disable (pure discipline). Tune via repo secret if desired.
          MIN_TRADES_PER_DAY:    ${{ secrets.MIN_TRADES_PER_DAY || '3' }}
          EXPLORE_QUALITY_FLOOR: ${{ secrets.EXPLORE_QUALITY_FLOOR || '35' }}
          # Macro event gate: hard = block all entries when CPI/FOMC imminent
          # (real-money setting), soft = half-size through events (paper
          # data-collection default), off = no gate.
          MACRO_GATE:            ${{ secrets.MACRO_GATE || 'soft' }}
          # 🌙 Overnight edge: buy the close, sell the open (tracked separately).
          OVERNIGHT_EDGE:          ${{ secrets.OVERNIGHT_EDGE || 'on' }}
          OVERNIGHT_TICKER:        ${{ secrets.OVERNIGHT_TICKER || 'QQQ' }}
          OVERNIGHT_NOTIONAL_FRAC: ${{ secrets.OVERNIGHT_NOTIONAL_FRAC || '0.20' }}
          # Opening-volatility entry gate (added after 2026-06-12 CPI whipsaw):
          # no new option entries in the first N min after the open; wider on
          # high-macro days. Exits + overnight edge still run.
          NO_ENTRY_MIN:            ${{ secrets.NO_ENTRY_MIN || '45' }}
          NO_ENTRY_MIN_MACRO:      ${{ secrets.NO_ENTRY_MIN_MACRO || '75' }}
          # Anti-churn + blowup insurance ONLY (data-collection friendly — these
          # do NOT throttle normal distinct trades). Cooldown blocks re-buying the
          # SAME contract (duplicate/noise data); the loss + count limits only trip
          # on a runaway that would destroy the account (and end data collection).
          REBUY_COOLDOWN_HOURS:    ${{ secrets.REBUY_COOLDOWN_HOURS || '8' }}
          MAX_DAILY_LOSS_DOLLARS:  ${{ secrets.MAX_DAILY_LOSS_DOLLARS || '1500' }}
          MAX_OPENS_PER_DAY:       ${{ secrets.MAX_OPENS_PER_DAY || '50' }}
          # Reject option contracts with a bid-ask spread wider than this %
          # (illiquid = bad fills). The 6/12 slippage fix.
          MAX_OPT_SPREAD_PCT:      ${{ secrets.MAX_OPT_SPREAD_PCT || '25' }}
          # Option structure: 'naked' (default, unchanged) or 'spread' to route each
          # CALL entry into a validated ATM/+10% bull-call debit spread.
          OPTION_STRUCTURE:        ${{ secrets.OPTION_STRUCTURE || 'naked' }}
          # Winner gate (meta-label): 'off' (default) shadow-logs the win/loss
          # separators to the journal only; 'on' also VETOES low-probability call
          # entries (not in uptrend / weak momentum / chasing highs / unreachable
          # strike). Validate with `python full_bot_backtest.py gate` before enabling.
          WINNER_GATE:             ${{ secrets.WINNER_GATE || 'off' }}
          # Source blocklist: comma-list of signal sources to skip entirely. The
          # journal showed PEAD (0/8) and bottom-fisher (0/3) are pure losers, so
          # the recommended live value is 'pead,bottom_fisher'. Empty = trade all.
          BLOCK_SIGNAL_SOURCES:    ${{ secrets.BLOCK_SIGNAL_SOURCES || '' }}
          # DIP-BUY strategy (backtested 63.6% win): 'on' adds mean-reversion ITM
          # calls on oversold dips in uptrends (RSI(2)<10), with target/stop/time
          # exits. Default 'off'. Run with OPTION_STRUCTURE=naked (DIPBUY wants the
          # ITM call, not a spread). See GO_LIVE.md / mean_reversion_strategy.py.
          DIPBUY:                  ${{ secrets.DIPBUY || 'off' }}
        run: python monitor.py
