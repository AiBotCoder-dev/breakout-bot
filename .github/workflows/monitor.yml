name: Position Monitor

# Runs every 5 minutes Mon-Fri during market hours.
# Schedule is in UTC:
#   13:30-20:00 UTC  =  9:30 AM - 4:00 PM EDT  (summer)
#   14:30-21:00 UTC  =  9:30 AM - 4:00 PM EST  (winter)
# We bracket 13:00-21:00 UTC to cover both seasons safely.
# The monitor.py script uses MarketClock to skip CLOSED/AVOID windows.

on:
  schedule:
    # GitHub frequently DROPS high-frequency '*/5' crons on busy public runners.
    # Explicit minute lists are honored far more reliably than '*/N'.
    # Fires ~every 10 min across the session (13:00-20:50 UTC, Mon-Fri).
    - cron: '0,10,20,30,40,50 13-20 * * 1-5'

  workflow_dispatch:               # also allow manual trigger from GitHub UI

jobs:
  monitor:
    name: Check open positions
    runs-on: ubuntu-latest
    timeout-minutes: 8             # full-market scan needs headroom (was 4)

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run position monitor
        env:
          DATABASE_URL:          ${{ secrets.DATABASE_URL }}
          TELEGRAM_BOT_TOKEN:    ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:      ${{ secrets.TELEGRAM_CHAT_ID }}
          # Optional AI keys — any ONE enables AI-written rationales.
          # Free signups: Groq (recommended) — https://console.groq.com/keys
          GROQ_API_KEY:          ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:    ${{ secrets.OPENROUTER_API_KEY }}
          # Optional live-data provider — Alpaca Markets (free IEX feed).
          # Massively more reliable than yfinance for cloud runners.
          # Sign up free: https://alpaca.markets/
          ALPACA_API_KEY:        ${{ secrets.ALPACA_API_KEY }}
          ALPACA_API_SECRET:     ${{ secrets.ALPACA_API_SECRET }}
          # Broker (paper) auto-trading. BROKER_MODE=alpaca_paper routes
          # auto-entries to a real Alpaca PAPER account. Paper keys fall back to
          # ALPACA_API_KEY/SECRET if dedicated paper keys aren't set.
          BROKER_MODE:           ${{ secrets.BROKER_MODE }}
          ALPACA_PAPER_KEY:      ${{ secrets.ALPACA_PAPER_KEY }}
          ALPACA_PAPER_SECRET:   ${{ secrets.ALPACA_PAPER_SECRET }}
          # Trade the account as if it had this much equity (e.g. 1000) regardless
          # of the real paper balance. 0/unset = use the real balance.
          ACCOUNT_EQUITY_OVERRIDE: ${{ secrets.ACCOUNT_EQUITY_OVERRIDE }}
          # Data-collection floor: guarantee at least this many option trades per
          # day so we gather a profitability sample fast. Top-up trades that fall
          # below the normal quality gate are tagged 'momentum_call_explore' in
          # the journal and kept OUT of the real-strategy win-rate stats.
          # Set to 0 to disable (pure discipline). Tune via repo secret if desired.
          MIN_TRADES_PER_DAY:    ${{ secrets.MIN_TRADES_PER_DAY || '3' }}
          EXPLORE_QUALITY_FLOOR: ${{ secrets.EXPLORE_QUALITY_FLOOR || '35' }}
        run: python monitor.py
